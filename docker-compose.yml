# Ilyon AI - Docker Compose Configuration
# Production deployment with API, Web Frontend, Redis, and PostgreSQL

services:
  # ═══════════════════════════════════════════════════════════════════════════
  # ILYON AI API
  # ═══════════════════════════════════════════════════════════════════════════
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ilyon-ai-api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://redis:6379/0
      - DATABASE_URL=postgresql://sentinel:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@postgres:5432/ilyon_ai
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    volumes:
      - ./logs:/app/logs
    networks:
      - ilyon-ai-network
    ports:
      - "${WEBHOOK_PORT:-8443}:${WEBHOOK_PORT:-8443}"
      - "${ACTIONS_API_PORT:-8080}:${ACTIONS_API_PORT:-8080}"
    healthcheck:
      test: ["CMD", "python", "-c", "import sys; sys.exit(0)"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ═══════════════════════════════════════════════════════════════════════════
  # ILYON AI WEB FRONTEND
  # ═══════════════════════════════════════════════════════════════════════════
  web:
    build:
      context: ./web
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${ACTIONS_BASE_URL:-https://ilyonai.com}
        NEXT_PUBLIC_SOLANA_NETWORK: mainnet-beta
        NEXT_PUBLIC_SOLANA_RPC_URL: https://api.mainnet-beta.solana.com
    container_name: ilyon-ai-web
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "3000:3000"
    networks:
      - ilyon-ai-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ═══════════════════════════════════════════════════════════════════════════
  # REDIS CACHE
  # ═══════════════════════════════════════════════════════════════════════════
  redis:
    image: redis:7-alpine
    container_name: ilyon-ai-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 100mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    networks:
      - ilyon-ai-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ═══════════════════════════════════════════════════════════════════════════
  # POSTGRESQL (Required for Blinks)
  # ═══════════════════════════════════════════════════════════════════════════
  postgres:
    image: postgres:15-alpine
    container_name: ilyon-ai-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ilyon_ai
      POSTGRES_USER: sentinel
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - ilyon-ai-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sentinel -d ilyon_ai"]
      interval: 10s
      timeout: 5s
      retries: 3

# ═══════════════════════════════════════════════════════════════════════════
# VOLUMES
# ═══════════════════════════════════════════════════════════════════════════
volumes:
  redis_data:
    driver: local
  postgres_data:
    driver: local

# ═══════════════════════════════════════════════════════════════════════════
# NETWORKS
# ═══════════════════════════════════════════════════════════════════════════
networks:
  ilyon-ai-network:
    driver: bridge

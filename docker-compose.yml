# Ilyon AI - Docker Compose Configuration
# Supports side-by-side production and staging deployments.

name: ${COMPOSE_PROJECT_NAME:-ai-sentinel}

services:
  # ═══════════════════════════════════════════════════════════════════════════
  # ILYON AI API
  # ═══════════════════════════════════════════════════════════════════════════
  api:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - ${APP_ENV_FILE:-.env}
    environment:
      REDIS_URL: redis://redis:6379/0
      WEB_API_PORT: ${API_CONTAINER_PORT:-8080}
      ACTIONS_API_PORT: ${API_CONTAINER_PORT:-8080}
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    volumes:
      - ${LOGS_DIR:-./logs/prod}:/app/logs
    ports:
      - "${API_HOST_PORT:-8080}:${API_CONTAINER_PORT:-8080}"
    healthcheck:
      test: ["CMD", "python", "-c", "import sys; sys.exit(0)"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ═══════════════════════════════════════════════════════════════════════════
  # AI WALLET ASSISTANT API
  # ═══════════════════════════════════════════════════════════════════════════
  assistant-api:
    build:
      context: ./IlyonAi-Wallet-assistant-main/server
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - ${ASSISTANT_ENV_FILE:-.env}
    volumes:
      - assistant_data:/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=5).read()"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ═══════════════════════════════════════════════════════════════════════════
  # ILYON AI WEB FRONTEND
  # ═══════════════════════════════════════════════════════════════════════════
  web:
    build:
      context: ./web
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://ilyonai.com}
        NEXT_PUBLIC_SOLANA_NETWORK: ${NEXT_PUBLIC_SOLANA_NETWORK:-mainnet-beta}
        NEXT_PUBLIC_SOLANA_RPC_URL: ${NEXT_PUBLIC_SOLANA_RPC_URL:-https://api.mainnet-beta.solana.com}
        NEXT_PUBLIC_COMING_SOON: ${NEXT_PUBLIC_COMING_SOON:-false}
        API_REWRITE_TARGET: ${API_REWRITE_TARGET:-http://api:8080}
        ASSISTANT_API_TARGET: ${ASSISTANT_API_TARGET:-http://assistant-api:8000}
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
      assistant-api:
        condition: service_healthy
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://ilyonai.com}
      NEXT_PUBLIC_SOLANA_NETWORK: ${NEXT_PUBLIC_SOLANA_NETWORK:-mainnet-beta}
      NEXT_PUBLIC_SOLANA_RPC_URL: ${NEXT_PUBLIC_SOLANA_RPC_URL:-https://api.mainnet-beta.solana.com}
      NEXT_PUBLIC_COMING_SOON: ${NEXT_PUBLIC_COMING_SOON:-false}
      API_REWRITE_TARGET: ${API_REWRITE_TARGET:-http://api:8080}
      ASSISTANT_API_TARGET: ${ASSISTANT_API_TARGET:-http://assistant-api:8000}
    ports:
      - "${WEB_HOST_PORT:-3000}:3000"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ═══════════════════════════════════════════════════════════════════════════
  # REDIS CACHE
  # ═══════════════════════════════════════════════════════════════════════════
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 100mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ═══════════════════════════════════════════════════════════════════════════
  # POSTGRESQL
  # ═══════════════════════════════════════════════════════════════════════════
  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ilyon_ai}
      POSTGRES_USER: ${POSTGRES_USER:-sentinel}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-sentinel} -d ${POSTGRES_DB:-ilyon_ai}"]
      interval: 10s
      timeout: 5s
      retries: 3

# ═══════════════════════════════════════════════════════════════════════════
# VOLUMES
# ═══════════════════════════════════════════════════════════════════════════
volumes:
  assistant_data:
    driver: local
  redis_data:
    driver: local
  postgres_data:
    driver: local
